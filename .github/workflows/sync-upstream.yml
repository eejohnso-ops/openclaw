name: Sync fork with upstream

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      workflows: write
    steps:
      - uses: actions/checkout@v4
      - run: gh repo sync ${{ github.repository }} --source openclaw/openclaw --branch main --force
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
